<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Drinks — GALA Restaurant · Bar · Café</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    window.GALA_TWEAKS = /*EDITMODE-BEGIN*/{
      "accent": "brass",
      "surface": "charcoal",
      "showOpenStatus": true,
      "showTestimonials": true,
      "showCocktails": true,
      "headerSerif": "playfair"
    }/*EDITMODE-END*/;
  </script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="hooks.jsx"></script>
  <script type="text/babel" src="components/bundle1.jsx"></script>
  <script type="text/babel" src="components/bundle2.jsx"></script>
  <script type="text/babel" src="components/bundle3.jsx"></script>

  <script type="text/babel">
    function DrinksApp() {
      const [tweaks, setTweaks] = React.useState(window.GALA_TWEAKS);

      React.useEffect(() => {
        const onTw = (e) => setTweaks({ ...e.detail });
        window.addEventListener('gala-tweaks', onTw);
        return () => window.removeEventListener('gala-tweaks', onTw);
      }, []);

      React.useEffect(() => {
        document.documentElement.dataset.accent = tweaks.accent;
        document.documentElement.dataset.surface = tweaks.surface;
        document.documentElement.dataset.headerSerif = tweaks.headerSerif;
      }, []);

      return (
        <>
          <window.Navbar tweaks={tweaks} />
          <main>
            <window.SubpageHero
              eyebrow="GALA Bar"
              title="Getränke-"
              italic="karte"
              summary="Kaffee, Softdrinks, Bier, Wein, Cocktails, Longdrinks, Shots und Sekt — unsere komplette Getränkekarte am Postplatz."
              meta="Am Postplatz · Titisee-Neustadt"
            />
            <window.DrinksPage />
          </main>
          <window.Footer />
          <window.GalaSubpageTweaks />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DrinksApp />);
  </script>
</body>
</html>
